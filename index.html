<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Block Comparator</title>
    <!-- SheetJS library for reading Excel (.xlsx/.xls) files directly in browser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        h1, h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .overlap { background-color: #ddffdd !important; font-weight: bold; }
        .absent { background-color: #fff3cd !important; font-weight: bold; color: #856404; }
        .no-overlap { background-color: #ffdddd !important; }
        .controls, .block-manager { margin: 20px 0; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 6px; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; }
        input[type="date"], input[type="time"], input[type="text"], select { padding: 6px; font-size: 0.95em; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 4px; }
        .block-list { margin-top: 10px; }
        .block-item { padding: 10px; margin: 6px 0; background: #f0f0f0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        #status { margin: 10px 0; color: #d32f2f; }
        .summary { font-weight: bold; margin: 15px 0; font-size: 1.1em; }
        .attendance { font-size: 1.4em; color: #0066cc; margin: 20px 0; padding: 15px; background: white; border: 2px solid #0066cc; border-radius: 8px; text-align: center; }
        .file-inputs { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .file-input-group { background: #fdfdfd; padding: 10px; border: 1px dashed #ccc; border-radius: 4px; }
        .status-msg { margin-top: 5px; font-weight: bold; color: #2e7d32; }
        .badge-absent { background: #ffc107; color: #000; padding: 3px 6px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .badge-cancelled { background: #dc3545; color: #fff; padding: 3px 6px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .badge-completed { background: #198754; color: #fff; padding: 3px 6px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .semester-picker-box { background: #eef6ff; border: 1px solid #b6d4fe; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Flight Block Comparator</h1>

    <!-- Flight Block Manager -->
    <div class="block-manager">
        <h2>Flight Block Manager</h2>
        <div>
            <label>Block Name: <input type="text" id="blockName" placeholder="e.g. Morning Block" value="Morning Block"></label><br><br>
            
            <strong>Day(s):</strong>
            <div class="checkbox-group">
                <label><input type="checkbox" value="1" checked> Monday</label>
                <label><input type="checkbox" value="2"> Tuesday</label>
                <label><input type="checkbox" value="3" checked> Wednesday</label>
                <label><input type="checkbox" value="4"> Thursday</label>
                <label><input type="checkbox" value="5" checked> Friday</label>
                <label><input type="checkbox" value="6"> Saturday</label>
                <label><input type="checkbox" value="0"> Sunday</label>
            </div><br>
            
            <label>Start Time: <input type="time" id="blockStart" value="08:30"></label>
            <label>End Time: <input type="time" id="blockEnd" value="11:00"></label><br><br>
            
            <button onclick="addFlightBlock()">Add Flight Block</button>
        </div>
        
        <div class="block-list" id="blockList"></div>
    </div>

    <!-- Main Controls -->
    <div class="controls">
        <!-- USU Semester Quick Selector -->
        <div class="semester-picker-box">
            <label><strong>Select USU Academic Semester:</strong> </label>
            <select id="usuSemesterSelect" onchange="loadUSUSemesterData()">
                <option value="spring2026">USU Spring Semester 2026</option>
                <option value="summer2026">USU Summer Semester 2026</option>
                <option value="fall2026">USU Fall Semester 2026</option>
                <option value="spring2027">USU Spring Semester 2027</option>
                <option value="custom">Custom Date Range</option>
            </select>
            <span id="semesterDataBadge" style="margin-left: 10px; font-size: 0.9em; color: #555;"></span>
        </div>

        <div class="file-inputs">
            <div class="file-input-group">
                <label><strong>1. Cancellation Reasons Log (.xlsx, .xls, .csv):</strong><br>
                <input type="file" id="cancellationFile" accept=".xlsx, .xls, .csv" onchange="handleCancellationFile(this)"></label>
                <div id="cancellationStatus" class="status-msg"></div>
            </div>

            <div class="file-input-group">
                <label><strong>2. Flight Activity Logs (CSV):</strong><br>
                <input type="file" id="csvFile" accept=".csv" multiple></label>
            </div>
        </div>

        <label>Semester Start: <input type="date" id="semesterStart"></label>
        <label>Semester End: <input type="date" id="semesterEnd"></label><br><br>

        <button onclick="processFiles()">Load Files & Compare</button>
        <button onclick="clearResults()">Clear</button>
    </div>
    
    <div id="status"></div>
    <div id="results"></div>

    <script>
        let flightBlocks = [];
        let cancellationRecords = [];

        // Built-in Utah State University (USU) Academic Semester Start/End Dates
        const usuSemesters = {
            spring2026: { start: '2026-01-05', end: '2026-04-21' },
            summer2026: { start: '2026-05-04', end: '2026-08-07' },
            fall2026:   { start: '2026-08-31', end: '2026-12-11' },
            spring2027: { start: '2027-01-11', end: '2027-04-27' }
        };

        function loadUSUSemesterData() {
            const selectedKey = document.getElementById('usuSemesterSelect').value;
            const badge = document.getElementById('semesterDataBadge');

            if (selectedKey === 'custom') {
                badge.innerHTML = '<em>Custom date range selected.</em>';
                return;
            }

            const semData = usuSemesters[selectedKey];
            if (semData) {
                document.getElementById('semesterStart').value = semData.start;
                document.getElementById('semesterEnd').value = semData.end;
                badge.innerHTML = `✔ Loaded preset range: <strong>${semData.start}</strong> to <strong>${semData.end}</strong>`;
            }
        }

        function handleCancellationFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet);

                cancellationRecords = json.map(row => {
                    const reason = String(row.Reason || row.reason || row['Cancellation Reason'] || row.Remarks || '').trim();
                    const dateVal = String(row.Date || row.date || row['Start Time'] || '').trim();
                    const parsedDate = parseFlexibleDate(dateVal);
                    
                    return {
                        dateKey: parsedDate ? formatDateKey(parsedDate) : null,
                        rawDate: dateVal,
                        reason: reason,
                        isStudentAbsent: reason.toLowerCase().includes('student absent')
                    };
                }).filter(item => item.reason.length > 0);

                const absentCount = cancellationRecords.filter(r => r.isStudentAbsent).length;
                document.getElementById('cancellationStatus').innerText = 
                    `✔ Loaded ${cancellationRecords.length} cancellation record(s) (${absentCount} flagged as "Student Absent").`;
            };
            reader.readAsArrayBuffer(file);
        }

        function renderFlightBlocks() {
            const container = document.getElementById('blockList');
            if (flightBlocks.length === 0) {
                container.innerHTML = '<em>No active flight blocks added yet.</em>';
                return;
            }

            container.innerHTML = '<strong>Active Flight Blocks:</strong><br>';
            flightBlocks.forEach((block, index) => {
                const dayNames = block.days.map(d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join(', ');
                const div = document.createElement('div');
                div.className = 'block-item';
                div.innerHTML = `
                    <span><strong>${block.name}</strong>: ${dayNames} ${block.start}–${block.end}</span>
                    <button onclick="removeFlightBlock(${index})" style="background:#ff4444;color:white;">Remove</button>
                `;
                container.appendChild(div);
            });
        }

        function addFlightBlock() {
            const name = document.getElementById('blockName').value.trim() || `Block ${flightBlocks.length + 1}`;
            const checkboxes = document.querySelectorAll('.checkbox-group input[type="checkbox"]');
            const selectedDays = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));
            const start = document.getElementById('blockStart').value;
            const end = document.getElementById('blockEnd').value;
            
            if (selectedDays.length === 0 || !start || !end) {
                return alert('Please select at least one day and set times');
            }
            
            flightBlocks.push({
                id: Date.now(),
                name: name,
                days: selectedDays,
                start: start,
                end: end
            });
            
            renderFlightBlocks();
            document.getElementById('blockName').value = '';
        }

        function removeFlightBlock(index) {
            if (confirm('Remove this flight block?')) {
                flightBlocks.splice(index, 1);
                renderFlightBlocks();
            }
        }

        function processFiles() {
            const csvFiles = document.getElementById('csvFile').files;

            if (csvFiles.length === 0) return alert('Select Flight Activity CSV file(s)');
            if (flightBlocks.length === 0) return alert('Add at least one flight block');
            
            const startInput = document.getElementById('semesterStart').value;
            const endInput = document.getElementById('semesterEnd').value;

            if (!startInput || !endInput) {
                return alert('Please enter both Semester Start and Semester End dates.');
            }

            const semesterStart = new Date(startInput + 'T00:00:00');
            const semesterEnd = new Date(endInput + 'T23:59:59');
            
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = 'Processing...';

            Array.from(csvFiles).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const fileContent = e.target.result;
                        const activities = parseStudentScheduleCSV(fileContent);
                        displayResults(file.name, activities, semesterStart, semesterEnd);
                    } catch (err) {
                        document.getElementById('status').innerHTML += `<p>Error: ${err.message}</p>`;
                    }
                };
                reader.readAsText(file);
            });
        }

        function parseStudentScheduleCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const activities = [];
            
            for (let line of lines) {
                if (!/\d{4}/.test(line)) continue;
                
                const fields = line.split('","').map(f => f.replace(/^"|"$/g, '').trim());
                
                let startStr = null, endStr = null, type = '', status = '', reasonStr = '';
                
                for (let f of fields) {
                    if (/\d{2} \w{3} \d{4} \d{2}:\d{2}/.test(f)) {
                        if (!startStr) startStr = f;
                        else if (!endStr) endStr = f;
                    }
                    if (f.includes('Academic') || f.includes('Oral') || f.includes('Flight') || f.includes('Check')) type = f;
                    if (['Completed','Cancelled','Scheduled'].includes(f)) status = f;
                    if (f.toLowerCase().includes('reason') || f.toLowerCase().includes('absent') || f.toLowerCase().includes('weather') || f.toLowerCase().includes('maintenance')) {
                        reasonStr = f;
                    }
                }
                
                // ONLY EXCLUDE activities categorized as Academic
                if (type.toLowerCase().includes('academic')) continue;
                
                if (startStr) {
                    const start = parseFlexibleDate(startStr);
                    const end = endStr ? parseFlexibleDate(endStr) : null;
                    const dateKey = start ? formatDateKey(start) : null;

                    let isStudentAbsent = reasonStr.toLowerCase().includes('student absent');
                    let cancellationReason = reasonStr;

                    if (dateKey) {
                        const match = cancellationRecords.find(c => c.dateKey === dateKey);
                        if (match) {
                            if (match.isStudentAbsent) isStudentAbsent = true;
                            if (!cancellationReason) cancellationReason = match.reason;
                        }
                    }

                    if (start) {
                        activities.push({
                            description: type || 'Flight Activity',
                            start: start,
                            end: end,
                            status: status || 'Completed',
                            isStudentAbsent: isStudentAbsent,
                            cancellationReason: cancellationReason || (status === 'Cancelled' ? 'Cancelled (Unspecified)' : '')
                        });
                    }
                }
            }
            return activities;
        }

        function parseFlexibleDate(str) {
            if (!str) return null;
            let date = new Date(str);
            return !isNaN(date.getTime()) ? date : null;
        }

        function formatDateKey(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function generateExpectedBlockSlots(semesterStart, semesterEnd) {
            const slots = [];
            let current = new Date(semesterStart);

            while (current <= semesterEnd) {
                const dayOfWeek = current.getDay();

                flightBlocks.forEach(block => {
                    if (block.days.includes(dayOfWeek)) {
                        const [sh, sm] = block.start.split(':').map(Number);
                        const [eh, em] = block.end.split(':').map(Number);

                        const blockStart = new Date(current);
                        blockStart.setHours(sh, sm, 0, 0);

                        const blockEnd = new Date(current);
                        blockEnd.setHours(eh, em, 0, 0);

                        slots.push({
                            date: new Date(current),
                            blockName: block.name,
                            start: blockStart,
                            end: blockEnd
                        });
                    }
                });
                current.setDate(current.getDate() + 1);
            }

            return slots;
        }

        function displayResults(filename, activities, semStart, semEnd) {
            const blockSlots = generateExpectedBlockSlots(semStart, semEnd);
            let attendedCount = 0;
            let studentAbsentCount = 0;

            const resultsData = blockSlots.map(slot => {
                const matchingActivity = activities.find(act => {
                    if (!act.start) return false;
                    const actEnd = act.end || new Date(act.start.getTime() + 60*60*1000);
                    return (act.start < slot.end && actEnd > slot.start);
                });

                const isFulfilled = !!matchingActivity;
                const isAbsent = matchingActivity && matchingActivity.isStudentAbsent;

                if (isFulfilled) attendedCount++;
                if (isAbsent) studentAbsentCount++;

                return {
                    slot: slot,
                    fulfilled: isFulfilled,
                    isAbsent: isAbsent,
                    activity: matchingActivity
                };
            });

            const totalSlots = blockSlots.length;
            const attendancePct = totalSlots > 0 ? Math.round((attendedCount / totalSlots) * 100) : 0;
            
            let html = `<h2>${filename}</h2>`;
            html += `<div class="attendance">📊 Flight Block Attendance Rate<br><strong>${attendancePct}%</strong><br><small>${attendedCount} / ${totalSlots} scheduled block slots fulfilled (${studentAbsentCount} marked "Student Absent")</small></div>`;
            html += `<p class="summary">Date range: ${semStart.toLocaleDateString()} – ${semEnd.toLocaleDateString()} | Active Exclusion: Academic Activities Only</p>`;
            
            if (totalSlots === 0) {
                html += `<p>No scheduled flight blocks found in this date range.</p>`;
            } else {
                html += `<table><thead><tr>
                    <th>Date</th>
                    <th>Scheduled Block</th>
                    <th>Block Time</th>
                    <th>Block Fulfilled?</th>
                    <th>CSV Activity</th>
                    <th>Activity Status</th>
                    <th>Cancellation Reason</th>
                </tr></thead><tbody>`;

                resultsData.forEach(item => {
                    const dateStr = item.slot.date.toLocaleDateString();
                    const timeStr = `${item.slot.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${item.slot.end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                    
                    let rowClass = 'no-overlap';
                    let fulfilledLabel = '❌ NO';
                    let statusBadge = '—';
                    let reasonDisplay = '—';

                    if (item.fulfilled) {
                        if (item.isAbsent) {
                            rowClass = 'absent';
                            fulfilledLabel = '⚠️ YES (ABSENT)';
                            statusBadge = '<span class="badge-cancelled">Cancelled</span>';
                            reasonDisplay = item.activity.cancellationReason || 'Student Absent';
                        } else {
                            rowClass = 'overlap';
                            fulfilledLabel = '✅ YES';
                            const actStatus = item.activity ? item.activity.status : 'Completed';
                            if (actStatus === 'Cancelled') {
                                statusBadge = '<span class="badge-cancelled">Cancelled</span>';
                                reasonDisplay = item.activity.cancellationReason || 'Unspecified';
                            } else {
                                statusBadge = '<span class="badge-completed">Completed</span>';
                                reasonDisplay = 'N/A';
                            }
                        }
                    }

                    const actDetails = item.activity 
                        ? `${item.activity.description} (${item.activity.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})})` 
                        : '—';

                    html += `<tr class="${rowClass}">
                        <td>${dateStr}</td>
                        <td>${item.slot.blockName}</td>
                        <td>${timeStr}</td>
                        <td>${fulfilledLabel}</td>
                        <td>${actDetails}</td>
                        <td>${statusBadge}</td>
                        <td>${reasonDisplay}</td>
                    </tr>`;
                });
                html += `</tbody></table>`;
            }
            html += `<hr>`;
            document.getElementById('results').innerHTML += html;
            document.getElementById('status').innerHTML = 'Done.';
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('cancellationFile').value = '';
            document.getElementById('cancellationStatus').innerText = '';
            cancellationRecords = [];
            loadUSUSemesterData();
        }

        window.onload = () => {
            renderFlightBlocks();
            loadUSUSemesterData();
        };
    </script>
</body>
</html>
