<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Block Comparator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        h1, h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .overlap { background-color: #ffdddd !important; font-weight: bold; }
        .no-overlap { background-color: #ddffdd !important; }
        .controls { margin: 20px 0; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 6px; }
        button { margin-right: 10px; padding: 8px 16px; }
        #status { margin: 10px 0; color: #d32f2f; }
        pre { background: #f4f4f4; padding: 10px; white-space: pre-wrap; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Flight Block Comparator</h1>
    <p><strong>Flight Block:</strong> Monday, Wednesday, Friday • 08:30 – 11:00 Mountain Time (America/Denver)</p>
    
    <div class="controls">
        <input type="file" id="xmlFile" accept=".xml" multiple>
        <button onclick="processFiles()">Load and Compare</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>
    
    <div id="status"></div>
    <div id="results"></div>

    <script>
        const FLIGHT_DAYS = [1, 3, 5]; // Mon=1, Wed=3, Fri=5
        const FLIGHT_START_HOUR = 8, FLIGHT_START_MIN = 30;
        const FLIGHT_END_HOUR = 11, FLIGHT_END_MIN = 0;
        const TIMEZONE = 'America/Denver';

        function processFiles() {
            const files = document.getElementById('xmlFile').files;
            if (files.length === 0) return alert('Select at least one XML file');
            
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = 'Processing...';
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const xmlDoc = new DOMParser().parseFromString(e.target.result, "text/xml");
                        const activities = parseActivities(xmlDoc);
                        displayResults(file.name, activities);
                    } catch (err) {
                        document.getElementById('status').innerHTML += `<p>Error with ${file.name}: ${err.message}</p>`;
                    }
                };
                reader.readAsText(file);
            });
        }

        function parseActivities(xmlDoc) {
            const activities = [];
            const tags = ['activity','event','flight','schedule','entry','log','item','record'];
            let items = [];
            
            for (let tag of tags) {
                items = xmlDoc.getElementsByTagName(tag);
                if (items.length > 0) break;
            }

            const processElement = (el, idx) => {
                const startStr = getTimeValue(el, ['start','startTime','begin','time','date','datetime','from']);
                const endStr = getTimeValue(el, ['end','endTime','finish','to']);
                const desc = el.getAttribute('name') || el.getAttribute('title') || el.getAttribute('id') || el.textContent.trim().substring(0,80) || `Activity ${idx+1}`;
                
                if (startStr) {
                    const start = parseFlexibleDate(startStr);
                    if (start) {
                        activities.push({
                            id: el.getAttribute('id') || `act-${idx}`,
                            description: desc,
                            start: start,
                            end: endStr ? parseFlexibleDate(endStr) : null
                        });
                    }
                }
            };

            if (items.length > 0) {
                Array.from(items).forEach((item, i) => processElement(item, i));
            } else {
                // Fallback: scan all elements
                Array.from(xmlDoc.getElementsByTagName('*')).forEach((el, i) => processElement(el, i));
            }
            
            return activities.filter(a => a.start);
        }

        function getTimeValue(el, keys) {
            for (let key of keys) {
                let val = el.getAttribute(key);
                if (!val) {
                    const child = el.querySelector(key) || el.querySelector(`[name="${key}"]`);
                    if (child) val = child.textContent.trim();
                }
                if (val) return val;
            }
            return null;
        }

        function parseFlexibleDate(str) {
            let date = new Date(str);
            if (!isNaN(date.getTime())) return date;
            
            // Try common variations
            const cleaned = str.replace(/([+-]\d{2}:?\d{2}|Z)$/,'');
            date = new Date(cleaned);
            return !isNaN(date.getTime()) ? date : null;
        }

        function isInFlightBlock(date) {
            if (!date) return false;
            const mt = new Date(date.toLocaleString("en-US", {timeZone: TIMEZONE}));
            const day = mt.getDay();
            if (!FLIGHT_DAYS.includes(day)) return false;
            
            const mins = mt.getHours() * 60 + mt.getMinutes();
            const blockStart = FLIGHT_START_HOUR * 60 + FLIGHT_START_MIN;
            const blockEnd = FLIGHT_END_HOUR * 60 + FLIGHT_END_MIN;
            
            return mins >= blockStart && mins < blockEnd;
        }

        function checkOverlap(act) {
            if (!act.start) return false;
            if (isInFlightBlock(act.start)) return true;
            if (act.end && isInFlightBlock(act.end)) return true;
            return false; // Basic overlap; extendable for full interval check
        }

        function displayResults(filename, activities) {
            let html = `<h2>${filename} — ${activities.length} activities found</h2>`;
            
            if (activities.length === 0) {
                html += `<p>No timed activities detected. The XML parser is flexible but your file may need custom adjustments (contact me for tweaks).</p>`;
                document.getElementById('results').innerHTML += html;
                return;
            }

            html += `<table><thead><tr><th>ID</th><th>Description</th><th>Start (MT)</th><th>End (MT)</th><th>Block Overlap?</th></tr></thead><tbody>`;
            
            activities.forEach(act => {
                const startStr = act.start.toLocaleString('en-US', {timeZone: TIMEZONE, timeZoneName: 'short'});
                const endStr = act.end ? act.end.toLocaleString('en-US', {timeZone: TIMEZONE, timeZoneName: 'short'}) : '—';
                const overlaps = checkOverlap(act);
                html += `<tr class="${overlaps ? 'overlap' : 'no-overlap'}">
                    <td>${act.id}</td>
                    <td>${act.description}</td>
                    <td>${startStr}</td>
                    <td>${endStr}</td>
                    <td>${overlaps ? '✅ YES (Conflict)' : 'No'}</td>
                </tr>`;
            });
            
            html += `</tbody></table><hr>`;
            document.getElementById('results').innerHTML += html;
            document.getElementById('status').innerHTML = '';
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = '';
        }
    </script>
</body>
</html>
