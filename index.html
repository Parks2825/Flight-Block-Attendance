<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Block Comparator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        h1, h2 { color: #333; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .overlap { background-color: #ffdddd !important; font-weight: bold; }
        .no-overlap { background-color: #ddffdd !important; }
        .controls, .block-manager { margin: 20px 0; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 6px; }
        button { margin: 5px; padding: 8px 16px; }
        input[type="date"], input[type="time"], input[type="text"] { padding: 6px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 4px; }
        .block-list { margin-top: 10px; }
        .block-item { padding: 10px; margin: 6px 0; background: #f0f0f0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        #status { margin: 10px 0; color: #d32f2f; }
        .summary { font-weight: bold; margin: 15px 0; font-size: 1.1em; }
        .attendance { font-size: 1.4em; color: #0066cc; margin: 20px 0; padding: 15px; background: white; border: 2px solid #0066cc; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>Flight Block Comparator</h1>

    <!-- Flight Block Manager -->
    <div class="block-manager">
        <h2>Flight Block Manager</h2>
        <div>
            <label>Block Name: <input type="text" id="blockName" placeholder="e.g. Morning Block" value="Morning Block"></label><br><br>
            
            <strong>Day(s):</strong>
            <div class="checkbox-group">
                <label><input type="checkbox" value="1" checked> Monday</label>
                <label><input type="checkbox" value="2"> Tuesday</label>
                <label><input type="checkbox" value="3" checked> Wednesday</label>
                <label><input type="checkbox" value="4"> Thursday</label>
                <label><input type="checkbox" value="5" checked> Friday</label>
                <label><input type="checkbox" value="6"> Saturday</label>
                <label><input type="checkbox" value="0"> Sunday</label>
            </div><br>
            
            <label>Start Time: <input type="time" id="blockStart" value="08:30"></label>
            <label>End Time: <input type="time" id="blockEnd" value="11:00"></label><br><br>
            
            <button onclick="addFlightBlock()">Add Flight Block</button>
        </div>
        
        <div class="block-list" id="blockList"></div>
    </div>

    <!-- Main Controls -->
    <div class="controls">
        <label>Semester Start: <input type="date" id="semesterStart"></label>
        <label>Semester End: <input type="date" id="semesterEnd"></label><br><br>
        
        <input type="file" id="csvFile" accept=".csv" multiple>
        <button onclick="processFiles()">Load CSV & Compare</button>
        <button onclick="clearResults()">Clear</button>
    </div>
    
    <div id="status"></div>
    <div id="results"></div>

    <script>
        let flightBlocks = [
            { id: 1, name: "Mon/Wed/Fri Morning", days: [1,3,5], start: "08:30", end: "11:00" }
        ];

        function renderFlightBlocks() {
            const container = document.getElementById('blockList');
            container.innerHTML = '<strong>Active Flight Blocks:</strong><br>';
            
            flightBlocks.forEach((block, index) => {
                const dayNames = block.days.map(d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join(', ');
                const div = document.createElement('div');
                div.className = 'block-item';
                div.innerHTML = `
                    <span><strong>${block.name}</strong>: ${dayNames} ${block.start}–${block.end}</span>
                    <button onclick="removeFlightBlock(${index})" style="background:#ff4444;color:white;">Remove</button>
                `;
                container.appendChild(div);
            });
        }

        function addFlightBlock() {
            const name = document.getElementById('blockName').value.trim() || `Block ${flightBlocks.length + 1}`;
            
            const checkboxes = document.querySelectorAll('.checkbox-group input[type="checkbox"]');
            const selectedDays = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => parseInt(cb.value));
            
            const start = document.getElementById('blockStart').value;
            const end = document.getElementById('blockEnd').value;
            
            if (selectedDays.length === 0 || !start || !end) {
                return alert('Please select at least one day and set times');
            }
            
            flightBlocks.push({
                id: Date.now(),
                name: name,
                days: selectedDays,
                start: start,
                end: end
            });
            
            renderFlightBlocks();
            document.getElementById('blockName').value = '';
        }

        function removeFlightBlock(index) {
            if (confirm('Remove this flight block?')) {
                flightBlocks.splice(index, 1);
                renderFlightBlocks();
            }
        }

        function processFiles() {
            const files = document.getElementById('csvFile').files;
            if (files.length === 0) return alert('Select CSV file(s)');
            if (flightBlocks.length === 0) return alert('Add at least one flight block');

            const semesterStart = document.getElementById('semesterStart').value ? new Date(document.getElementById('semesterStart').value) : null;
            let semesterEnd = document.getElementById('semesterEnd').value ? new Date(document.getElementById('semesterEnd').value) : null;
            if (semesterEnd) semesterEnd.setHours(23,59,59,999);

            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = 'Processing...';

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const activities = parseStudentScheduleCSV(e.target.result, semesterStart, semesterEnd);
                        displayResults(file.name, activities, semesterStart, semesterEnd);
                    } catch (err) {
                        document.getElementById('status').innerHTML += `<p>Error: ${err.message}</p>`;
                    }
                };
                reader.readAsText(file);
            });
        }

        function parseStudentScheduleCSV(csvText, semesterStart, semesterEnd) {
            const lines = csvText.trim().split('\n');
            const activities = [];
            
            for (let line of lines) {
                if (!line.includes('2026')) continue;
                
                const fields = line.split('","').map(f => f.replace(/^"|"$/g, '').trim());
                
                let startStr = null, endStr = null, type = '', status = '';
                
                for (let f of fields) {
                    if (/\d{2} \w{3} 2026 \d{2}:\d{2}/.test(f)) {
                        if (!startStr) startStr = f;
                        else if (!endStr) endStr = f;
                    }
                    if (f.includes('Academic') || f.includes('Oral') || f.includes('Flight') || f.includes('Check')) type = f;
                    if (['Completed','Cancelled'].includes(f)) status = f;
                }
                
                if (type.includes('Academic / Normal')) continue;
                if (status === 'Cancelled') continue;  // NEW: Exclude Cancelled from attendance
                
                if (startStr) {
                    const start = parseFlexibleDate(startStr);
                    const end = endStr ? parseFlexibleDate(endStr) : null;
                    
                    if (start && (!semesterStart || start >= semesterStart) && (!semesterEnd || start <= semesterEnd)) {
                        activities.push({
                            id: start.toLocaleDateString(),
                            description: type || 'Flight Activity',
                            start: start,
                            end: end,
                            status: status || 'Unknown'
                        });
                    }
                }
            }
            return activities;
        }

        function parseFlexibleDate(str) {
            if (!str) return null;
            let date = new Date(str);
            return !isNaN(date.getTime()) ? date : null;
        }

        function isInAnyFlightBlock(date) {
            if (!date) return false;
            const mt = new Date(date.toLocaleString("en-US", {timeZone: 'America/Denver'}));
            const day = mt.getDay();
            const mins = mt.getHours() * 60 + mt.getMinutes();
            
            for (let block of flightBlocks) {
                if (block.days.includes(day)) {
                    const [sh, sm] = block.start.split(':').map(Number);
                    const [eh, em] = block.end.split(':').map(Number);
                    if (mins >= (sh*60 + sm) && mins < (eh*60 + em)) return true;
                }
            }
            return false;
        }

        function checkOverlap(act) {
            return act.start && (isInAnyFlightBlock(act.start) || (act.end && isInAnyFlightBlock(act.end)));
        }

        function displayResults(filename, activities, semStart, semEnd) {
            const total = activities.length;           // only Completed + other non-Cancelled
            const overlaps = activities.filter(checkOverlap).length;
            const attendancePct = total > 0 ? Math.round((overlaps / total) * 100) : 0;
            
            let html = `<h2>${filename}</h2>`;
            html += `<div class="attendance">📊 Flight Block Attendance<br>(excluding Academic / Normal and Cancelled): <strong>${attendancePct}%</strong><br><small>${overlaps} / ${total} qualifying activities</small></div>`;
            
            if (semStart || semEnd) html += `<p class="summary">Date range: ${semStart ? semStart.toLocaleDateString() : ''} – ${semEnd ? semEnd.toLocaleDateString() : ''}</p>`;
            
            if (total === 0) {
                html += `<p>No qualifying (non-cancelled, non-academic) activities found.</p>`;
            } else {
                html += `<table><thead><tr><th>Date</th><th>Description</th><th>Start (MT)</th><th>End (MT)</th><th>Status</th><th>In Block?</th></tr></thead><tbody>`;
                activities.forEach(act => {
                    const overlaps = checkOverlap(act);
                    html += `<tr class="${overlaps ? 'overlap' : 'no-overlap'}">
                        <td>${act.start.toLocaleDateString()}</td>
                        <td>${act.description}</td>
                        <td>${act.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', timeZone: 'America/Denver'})}</td>
                        <td>${act.end ? act.end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', timeZone: 'America/Denver'}) : '—'}</td>
                        <td>${act.status}</td>
                        <td>${overlaps ? '✅ YES' : 'No'}</td>
                    </tr>`;
                });
                html += `</tbody></table>`;
            }
            html += `<hr>`;
            document.getElementById('results').innerHTML += html;
            document.getElementById('status').innerHTML = 'Done.';
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = '';
        }

        window.onload = () => {
            renderFlightBlocks();
            document.getElementById('semesterStart').value = '2026-01-01';
            document.getElementById('semesterEnd').value = '2026-07-17';
        };
    </script>
</body>
</html>
